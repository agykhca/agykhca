name: Build and Test
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Setup Go environment
        uses: actions/setup-go@v2
        with:
          go-version: '1.19'
      - name: Install dependencies
        run: go get -d ./...
      - name: Build
        run: go build -o main main.go
      - name: Test
        run: go test -v -cover
        env:
          GOOS: linux
          GOARCH: amd64
      - name: Always succeed
        run: echo 'Test successful'
